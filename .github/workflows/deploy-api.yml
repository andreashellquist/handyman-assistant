name: Deploy fakturabackend till Azure Functions

# Bygger och deployar api/ när något under api/ ändras på main, eller manuellt.
on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  PROJECT: "api/Handyman.Functions.csproj"

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Kör bara om funktionsappens namn är konfigurerat (repo-variabel),
    # så forkar/cloner utan Azure inte misslyckas.
    if: ${{ vars.AZURE_FUNCTIONAPP_NAME != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Sätt upp .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Bygg & publicera
        run: dotnet publish ${{ env.PROJECT }} -c Release -o ./output

      - name: Deploya till Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: ./output
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
