name: Deploy frontend till GitHub Pages

# Deployar den statiska appen (index.html, css/, js/) vid push till main,
# samt manuellt. Backenden (api/) deployas av deploy-api.yml.
on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "css/**"
      - "js/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Samla statiska filer
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r css js _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
